document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

ding: 0; }\n  body {\n    background: #f6f6f4;\n    color: #000000;\n    font-family: \"Hanken Grotesk\", system-ui, sans-serif;\n    -webkit-font-smoothing: antialiased;\n    text-rendering: optimizeLegibility;\n  }\n  ::selection { background: #fff347; color: #000; }\n  a { color: inherit; }\n  @keyframes zr-rise { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: none; } }\n  @media (prefers-reduced-motion: reduce) { * { animation: none !important; transition: none !important; } }\n<\u002Fstyle>\n<\u002Fhelmet>\n\n<div style=\"background:#f6f6f4; min-height:100vh; animation: zr-rise .5s ease both;\">\n\n  <!-- TOP NAV (live component spec) -->\n  <header style=\"position:sticky; top:0; z-index:50; height:56px; background:rgba(246,246,244,0.86); backdrop-filter:saturate(120%) blur(6px); border-bottom:1px solid #d0d0c8;\">\n    <div style=\"max-width:1200px; margin:0 auto; padding:0 24px; height:100%; display:flex; align-items:center; justify-content:space-between; gap:24px;\">\n      <div style=\"display:flex; align-items:center; gap:12px;\">\n        <span style=\"display:inline-block; width:18px; height:6px; background:#2c2c26;\"><\u002Fspan>\n        <span style=\"font-family:'IBM Plex Mono',monospace; font-size:12px; font-weight:500; letter-spacing:0.06em; text-transform:uppercase; color:#000;\">WARM EDITORIAL ZINE<\u002Fspan>\n      <\u002Fdiv>\n      <nav style=\"display:flex; align-items:center; gap:4px;\">\n        <a href=\"#palette\" style=\"font-family:'IBM Plex Mono',monospace; font-size:12px; font-weight:500; letter-spacing:0.04em; text-transform:uppercase; color:#6d6e5e; text-decoration:none; padding:6px 10px; border-radius:3px;\" style-hover=\"color:#000;\">Color<\u002Fa>\n        <a href=\"#type\" style=\"font-family:'IBM Plex Mono',monospace; font-size:12px; font-weight:500; letter-spacing:0.04em; text-transform:uppercase; color:#6d6e5e; text-decoration:none; padding:6px 10px; border-radius:3px;\" style-hover=\"color:#000;\">Type<\u002Fa>\n        <a href=\"#components\" style=\"font-family:'IBM Plex Mono',monospace; font-size:12px; font-weight:500; letter-spacing:0.04em; text-transform:uppercase; color:#6d6e5e; text-decoration:none; padding:6px 10px; border-radius:3px;\" style-hover=\"color:#000;\">Components<\u002Fa>\n        <a href=\"#modules\" style=\"font-family:'IBM Plex Mono',monospace; font-size:12px; font-weight:500; letter-spacing:0.04em; text-transform:uppercase; color:#6d6e5e; text-decoration:none; padding:6px 10px; border-radius:3px;\" style-hover=\"color:#000;\">Modules<\u002Fa>\n      <\u002Fnav>\n    <\u002Fdiv>\n  <\u002Fheader>\n\n  <!-- COVER -->\n  <section data-screen-label=\"Cover\" style=\"max-width:1200px; margin:0 auto; padding:96px 24px 80px;\">\n    <div style=\"display:flex; align-items:center; gap:12px; margin-bottom:32px;\">\n      <span style=\"font-family:'IBM Plex Mono',monospace; font-size:12px; font-weight:500; color:#000;\">00<\u002Fspan>\n      <span style=\"width:24px; height:1px; background:#57584b;\"><\u002Fspan>\n      <span style=\"font-family:'IBM Plex Mono',monospace; font-size:12px; font-weight:500; letter-spacing:0.06em; text-transform:uppercase; color:#6d6e5e;\">Design System · Operating Contract<\u002Fspan>\n    <\u002Fdiv>\n    <h1 style=\"font-family:'Fraunces',serif; font-weight:300; font-size:clamp(2.6rem,7vw,6rem); line-height:0.94; letter-spacing:-0.04em; color:#000; margin:0; max-width:14ch;\">Warm Editorial <span style=\"position:relative; white-space:nowrap;\">Zine<span style=\"position:absolute; left:0; right:0; bottom:0.02em; height:0.07em; background:#000; z-index:-1;\"><\u002Fspan><\u002Fspan><\u002Fh1>\n    <p style=\"font-family:'Hanken Grotesk',sans-serif; font-size:18px; line-height:1.6; color:#57584b; max-width:560px; margin:32px 0 0;\">A living design system for an AI-native product executive's knowledge system. Cream paper, sharp serif posters, mono marginalia, flat surfaces, hairline borders, and a single yellow highlighter mark.<\u002Fp>\n    <div style=\"display:flex; flex-wrap:wrap; gap:8px; margin-top:32px;\">\n      <span style=\"font-family:'IBM Plex Mono',monospace; font-size:12px; font-weight:500; color:#6d6e5e; border:1px solid #aaa674; background:#e8e7d9; padding:4px 8px; border-radius:3px;\">SHARP, NOT LOUD<\u002Fspan>\n      <span style=\"font-family:'IBM Plex Mono',monospace; font-size:12px; font-weight:500; color:#6d6e5e; border:1px solid #aaa674; background:#e8e7d9; padding:4px 8px; border-radius:3px;\">EDITORIAL, NOT DECORATIVE<\u002Fspan>\n      <span style=\"font-family:'IBM Plex Mono',monospace; font-size:12px; font-weight:500; color:#6d6e5e; border:1px solid #aaa674; background:#e8e7d9; padding:4px 8px; border-radius:3px;\">TIMELESS, NOT TRENDY<\u002Fspan>\n      <span style=\"font-family:'IBM Plex Mono',monospace; font-size:12px; font-weight:500; color:#6d6e5e; border:1px solid #aaa674; background:#e8e7d9; padding:4px 8px; border-radius:3px;\">CONFIDENT, NOT SELF-PROMOTIONAL<\u002Fspan>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- 01 THESIS -->\n  <section data-screen-label=\"Thesis\" style=\"border-top:1px solid #d0d0c8;\">\n    <div style=\"max-width:1200px; margin:0 auto; padding:80px 24px;\">\n      <div style=\"display:flex; align-items:center; gap:12px; margin-bottom:20px;\">\n        <span style=\"font-family:'IBM Plex Mono',monospace; font-size:12px; font-weight:500; color:#000;\">01<\u002Fspan>\n        <span style=\"width:24px; height:1px; background:#57584b;\"><\u002Fspan>\n        <span style=\"font-family:'IBM Plex Mono',monospace; font-size:12px; font-weight:500; letter-spacing:0.06em; text-transform:uppercase; color:#6d6e5e;\">Thesis &amp; Principles<\u002Fspan>\n      <\u002Fdiv>\n      <h2 style=\"font-family:'Fraunces',serif; font-weight:300; font-size:clamp(1.8rem,3.6vw,2.5rem); line-height:1.08; letter-spacing:-0.02em; color:#000; margin:0 0 16px; max-width:18ch;\">The strongest version should feel inevitable, not impressive.<\u002Fh2>\n      <p style=\"font-family:'Hanken Grotesk',sans-serif; font-size:16px; line-height:1.6; color:#57584b; max-width:620px; margin:0 0 48px;\">The brand is carried by typography, spacing, rhythm, and hierarchy — never by decoration. When in doubt, remove decoration and increase clarity.<\u002Fp>\n\n      <div style=\"display:grid; grid-template-columns:repeat(auto-fit,minmax(280px,1fr)); gap:24px;\">\n        <div style=\"background:#ffffff; border:1px solid #d0d0c8; border-radius:8px; padding:24px;\">\n          <p style=\"font-family:'IBM Plex Mono',monospace; font-size:11px; font-weight:500; letter-spacing:0.06em; text-transform:uppercase; color:#6d6e5e; margin:0 0 16px;\">MUST COMMUNICATE<\u002Fp>\n          <ul style=\"list-style:none; margin:0; padding:0; display:flex; flex-direction:column; gap:10px;\">\n            <li style=\"font-family:'Hanken Grotesk',sans-serif; font-size:15px; color:#2c2c26; display:flex; gap:10px; align-items:baseline;\"><span style=\"width:6px; height:6px; background:#000; flex:0 0 6px;\"><\u002Fspan>Executive clarity &amp; calm confidence<\u002Fli>\n            <li style=\"font-family:'Hanken Grotesk',sans-serif; font-size:15px; color:#2c2c26; display:flex; gap:10px; align-items:baseline;\"><span style=\"width:6px; height:6px; background:#000; flex:0 0 6px;\"><\u002Fspan>Systems thinking &amp; editorial intelligence<\u002Fli>\n            <li style=\"font-family:'Hanken Grotesk',sans-serif; font-size:15px; color:#2c2c26; display:flex; gap:10px; align-items:baseline;\"><span style=\"width:6px; height:6px; background:#000; flex:0 0 6px;\"><\u002Fspan>Premium restraint &amp; strategic depth<\u002Fli>\n            <li style=\"font-family:'Hanken Grotesk',sans-serif; font-size:15px; color:#2c2c26; display:flex; gap:10px; align-items:baseline;\"><span style=\"width:6px; height:6px; background:#000; flex:0 0 6px;\"><\u002Fspan>Evidence-backed credibility<\u002Fli>\n          <\u002Ful>\n        <\u002Fdiv>\n        <div style=\"background:#ffffff; border:1px solid #d0d0c8; border-radius:8px; padding:24px;\">\n          <p style=\"font-family:'IBM Plex Mono',monospace; font-size:11px; font-weight:500; letter-spacing:0.06em; text-transform:uppercase; color:#6d6e5e; margin:0 0 16px;\">MUST NOT COMMUNICATE<\u002Fp>\n          <ul style=\"list-style:none; margin:0; padding:0; display:flex; flex-direction:column; gap:10px;\">\n            <li style=\"font-family:'Hanken Grotesk',sans-serif; font-size:15px; color:#979886; display:flex; gap:10px; align-items:baseline;\"><span style=\"width:10px; height:1px; background:#979886; flex:0 0 10px; transform:translateY(-4px);\"><\u002Fspan>Generic portfolio / Dribbble polish<\u002Fli>\n            <li style=\"font-family:'Hanken Grotesk',sans-serif; font-size:15px; color:#979886; display:flex; gap:10px; align-items:baseline;\"><span style=\"width:10px; height:1px; background:#979886; flex:0 0 10px; transform:translateY(-4px);\"><\u002Fspan>Trendy AI landing page / SaaS template<\u002Fli>\n            <li style=\"font-family:'Hanken Grotesk',sans-serif; font-size:15px; color:#979886; display:flex; gap:10px; align-items:baseline;\"><span style=\"width:10px; height:1px; background:#979886; flex:0 0 10px; transform:translateY(-4px);\"><\u002Fspan>Overdesigned personal brand<\u002Fli>\n            <li style=\"font-family:'Hanken Grotesk',sans-serif; font-size:15px; color:#979886; display:flex; gap:10px; align-items:baseline;\"><span style=\"width:10px; height:1px; background:#979886; flex:0 0 10px; transform:translateY(-4px);\"><\u002Fspan>Decorative motion / visual noise<\u002Fli>\n          <\u002Ful>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- 02 PALETTE -->\n  <section id=\"palette\" data-screen-label=\"Color\" style=\"border-top:1px solid #d0d0c8;\">\n    <div style=\"max-width:1200px; margin:0 auto; padding:80px 24px;\">\n      <div style=\"display:flex; align-items:center; gap:12px; margin-bottom:20px;\">\n        <span style=\"font-family:'IBM Plex Mono',monospace; font-size:12px; font-weight:500; color:#000;\">02<\u002Fspan>\n        <span style=\"width:24px; height:1px; background:#57584b;\"><\u002Fspan>\n        <span style=\"font-family:'IBM Plex Mono',monospace; font-size:12px; font-weight:500; letter-spacing:0.06em; text-transform:uppercase; color:#6d6e5e;\">Palette<\u002Fspan>\n      <\u002Fdiv>\n      <h2 style=\"font-family:'Fraunces',serif; font-weight:300; font-size:clamp(1.8rem,3.6vw,2.5rem); line-height:1.08; letter-spacing:-0.02em; color:#000; margin:0 0 8px;\">Near-monochrome, warm, olive-sage.<\u002Fh2>\n      <p style=\"font-family:'Hanken Grotesk',sans-serif; font-size:16px; line-height:1.6; color:#57584b; max-width:560px; margin:0 0 48px;\">Twelve restrained values. Highlighter Yellow is the single vivid accent — never a background, never a fill.<\u002Fp>\n\n      <div style=\"display:grid; grid-template-columns:repeat(auto-fill,minmax(180px,1fr)); gap:0; border:1px solid #d0d0c8; border-radius:8px; overflow:hidden;\">\n        <sc-for list=\"{{ palette }}\" as=\"c\" hint-placeholder-count=\"12\">\n          <div style=\"border-right:1px solid #d0d0c8; border-bottom:1px solid #d0d0c8;\">\n            <div style=\"height:96px; background:{{ c.hex }}; border-bottom:1px solid rgba(0,0,0,0.06); display:flex; align-items:flex-end; padding:12px 14px;\">\n              <span style=\"font-family:'IBM Plex Mono',monospace; font-size:12px; font-weight:500; letter-spacing:0.02em; text-transform:uppercase; color:{{ c.fg }};\">{{ c.hex }}<\u002Fspan>\n            <\u002Fdiv>\n            <div style=\"padding:12px 14px 16px;\">\n              <p style=\"font-family:'Hanken Grotesk',sans-serif; font-weight:600; font-size:14px; color:#000; margin:0 0 2px;\">{{ c.name }}<\u002Fp>\n              <p style=\"font-family:'Hanken Grotesk',sans-serif; font-size:12px; line-height:1.4; color:#979886; margin:0;\">{{ c.use }}<\u002Fp>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fsc-for>\n      <\u002Fdiv>\n\n      <!-- Accent rule -->\n      <div style=\"display:grid; grid-template-columns:repeat(auto-fit,minmax(280px,1fr)); gap:24px; margin-top:24px;\">\n        <div style=\"background:#ffffff; border:1px solid #d0d0c8; border-radius:8px; padding:24px; display:flex; flex-direction:column; gap:16px;\">\n          <p style=\"font-family:'IBM Plex Mono',monospace; font-size:11px; font-weight:500; letter-spacing:0.06em; text-transform:uppercase; color:#6d6e5e; margin:0;\">ACCENT RULE · MAX 3–4 / SCREEN<\u002Fp>\n          <div style=\"display:flex; align-items:center; gap:14px; flex-wrap:wrap;\">\n            <span style=\"display:inline-block; width:56px; height:6px; background:#fff347;\"><\u002Fspan>\n            <span style=\"display:inline-block; width:40px; height:3px; background:#000;\"><\u002Fspan>\n            <span style=\"font-family:'Hanken Grotesk',sans-serif; font-size:15px; color:#2c2c26;\">A <mark style=\"background:#fff347; color:#000; padding:0 2px;\">highlighted<\u002Fmark> phrase.<\u002Fspan>\n          <\u002Fdiv>\n          <p style=\"font-family:'Hanken Grotesk',sans-serif; font-size:13px; line-height:1.5; color:#979886; margin:0;\">Allowed: 2–6px strokes, small bars, small highlight blocks. Never: large backgrounds, body text, filled buttons.<\u002Fp>\n        <\u002Fdiv>\n        <div style=\"background:#ffffff; border:1px solid #d0d0c8; border-radius:8px; padding:24px;\">\n          <p style=\"font-family:'IBM Plex Mono',monospace; font-size:11px; font-weight:500; letter-spacing:0.06em; text-transform:uppercase; color:#6d6e5e; margin:0 0 16px;\">SURFACES<\u002Fp>\n          <div style=\"display:flex; flex-direction:column; gap:10px;\">\n            <div style=\"display:flex; align-items:center; gap:12px;\"><span style=\"width:28px; height:28px; border-radius:3px; background:#f6f6f4; border:1px solid #d0d0c8;\"><\u002Fspan><span style=\"font-family:'Hanken Grotesk',sans-serif; font-size:14px; color:#2c2c26;\">Vellum — page canvas (never pure white)<\u002Fspan><\u002Fdiv>\n            <div style=\"display:flex; align-items:center; gap:12px;\"><span style=\"width:28px; height:28px; border-radius:3px; background:#ffffff; border:1px solid #d0d0c8;\"><\u002Fspan><span style=\"font-family:'Hanken Grotesk',sans-serif; font-size:14px; color:#2c2c26;\">Paper — cards &amp; elevated panels<\u002Fspan><\u002Fdiv>\n            <div style=\"display:flex; align-items:center; gap:12px;\"><span style=\"width:28px; height:28px; border-radius:3px; background:#2c2c26;\"><\u002Fspan><span style=\"font-family:'Hanken Grotesk',sans-serif; font-size:14px; color:#2c2c26;\">Carbon — dark panels, footer, filled buttons<\u002Fspan><\u002Fdiv>\n            <div style=\"display:flex; align-items:center; gap:12px;\"><span style=\"width:28px; height:28px; border-radius:3px; background:#e8e7d9; border:1px solid #aaa674;\"><\u002Fspan><span style=\"font-family:'Hanken Grotesk',sans-serif; font-size:14px; color:#2c2c26;\">Bone — soft tags, warm tint zones<\u002Fspan><\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- 03 TYPOGRAPHY -->\n  <section id=\"type\" data-screen-label=\"Typography\" style=\"border-top:1px solid #d0d0c8;\">\n    <div style=\"max-width:1200px; margin:0 auto; padding:80px 24px;\">\n      <div style=\"display:flex; align-items:center; gap:12px; margin-bottom:20px;\">\n        <span style=\"font-family:'IBM Plex Mono',monospace; font-size:12px; font-weight:500; color:#000;\">03<\u002Fspan>\n        <span style=\"width:24px; height:1px; background:#57584b;\"><\u002Fspan>\n        <span style=\"font-family:'IBM Plex Mono',monospace; font-size:12px; font-weight:500; letter-spacing:0.06em; text-transform:uppercase; color:#6d6e5e;\">Typography<\u002Fspan>\n      <\u002Fdiv>\n      <h2 style=\"font-family:'Fraunces',serif; font-weight:300; font-size:clamp(1.8rem,3.6vw,2.5rem); line-height:1.08; letter-spacing:-0.02em; color:#000; margin:0 0 48px;\">Three voices. Mono is seasoning, not the meal.<\u002Fh2>\n\n      <!-- Voices -->\n      <div style=\"display:grid; grid-template-columns:repeat(auto-fit,minmax(280px,1fr)); gap:0; border:1px solid #d0d0c8; border-radius:8px; overflow:hidden; margin-bottom:48px;\">\n        <div style=\"padding:24px; border-right:1px solid #d0d0c8;\">\n          <p style=\"font-family:'IBM Plex Mono',monospace; font-size:11px; font-weight:500; letter-spacing:0.06em; text-transform:uppercase; color:#6d6e5e; margin:0 0 16px;\">01 · EDITORIAL SERIF<\u002Fp>\n          <p style=\"font-family:'Fraunces',serif; font-weight:300; font-size:48px; line-height:1; letter-spacing:-0.02em; color:#000; margin:0 0 12px;\">Fraunces<\u002Fp>\n          <p style=\"font-family:'Hanken Grotesk',sans-serif; font-size:13px; line-height:1.5; color:#979886; margin:0;\">Display, hero headlines, belief statements, pull lines. Weight 300–400, tight tracking.<\u002Fp>\n        <\u002Fdiv>\n        <div style=\"padding:24px; border-right:1px solid #d0d0c8;\">\n          <p style=\"font-family:'IBM Plex Mono',monospace; font-size:11px; font-weight:500; letter-spacing:0.06em; text-transform:uppercase; color:#6d6e5e; margin:0 0 16px;\">02 · SANS BODY<\u002Fp>\n          <p style=\"font-family:'Hanken Grotesk',sans-serif; font-weight:500; font-size:48px; line-height:1; letter-spacing:-0.02em; color:#000; margin:0 0 12px;\">Hanken<\u002Fp>\n          <p style=\"font-family:'Hanken Grotesk',sans-serif; font-size:13px; line-height:1.5; color:#979886; margin:0;\">The default reading voice: body copy, summaries, descriptions. ~14–18px, generous line-height.<\u002Fp>\n        <\u002Fdiv>\n        <div style=\"padding:24px;\">\n          <p style=\"font-family:'IBM Plex Mono',monospace; font-size:11px; font-weight:500; letter-spacing:0.06em; text-transform:uppercase; color:#6d6e5e; margin:0 0 16px;\">03 · GEOMETRIC MONO<\u002Fp>\n          <p style=\"font-family:'IBM Plex Mono',monospace; font-weight:500; font-size:44px; line-height:1; letter-spacing:-0.02em; color:#000; margin:0 0 14px;\">IBM Plex<\u002Fp>\n          <p style=\"font-family:'Hanken Grotesk',sans-serif; font-size:13px; line-height:1.5; color:#979886; margin:0;\">System seasoning only: labels, eyebrows, indices, metadata, tags. 11–13px. Never paragraph body.<\u002Fp>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <!-- Type scale -->\n      <p style=\"font-family:'IBM Plex Mono',monospace; font-size:11px; font-weight:500; letter-spacing:0.06em; text-transform:uppercase; color:#6d6e5e; margin:0 0 8px;\">TYPE SCALE<\u002Fp>\n      <div style=\"border-top:1px solid #d0d0c8;\">\n        <sc-for list=\"{{ scale }}\" as=\"t\" hint-placeholder-count=\"9\">\n          <div style=\"display:flex; align-items:baseline; gap:24px; padding:18px 0; border-bottom:1px solid #d0d0c8;\">\n            <span style=\"flex:0 0 132px; font-family:'IBM Plex Mono',monospace; font-size:11px; color:#6d6e5e; line-height:1.4;\">{{ t.meta }}<\u002Fspan>\n            <span style=\"flex:1 1 auto; min-width:0; color:#000; font-family:{{ t.family }}; font-weight:{{ t.weight }}; font-size:{{ t.px }}; line-height:1.02; letter-spacing:{{ t.track }}; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;\">{{ t.name }}<\u002Fspan>\n          <\u002Fdiv>\n        <\u002Fsc-for>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- 04 SPACE / RADII / ELEVATION -->\n  <section data-screen-label=\"Foundations\" style=\"border-top:1px solid #d0d0c8;\">\n    <div style=\"max-width:1200px; margin:0 auto; padding:80px 24px;\">\n      <div style=\"display:flex; align-items:center; gap:12px; margin-bottom:20px;\">\n        <span style=\"font-family:'IBM Plex Mono',monospace; font-size:12px; font-weight:500; color:#000;\">04<\u002Fspan>\n        <span style=\"width:24px; height:1px; background:#57584b;\"><\u002Fspan>\n        <span style=\"font-family:'IBM Plex Mono',monospace; font-size:12px; font-weight:500; letter-spacing:0.06em; text-transform:uppercase; color:#6d6e5e;\">Spacing · Radii · Elevation<\u002Fspan>\n      <\u002Fdiv>\n      <h2 style=\"font-family:'Fraunces',serif; font-weight:300; font-size:clamp(1.8rem,3.6vw,2.5rem); line-height:1.08; letter-spacing:-0.02em; color:#000; margin:0 0 48px;\">Flat by intention. Hierarchy from rules &amp; rhythm.<\u002Fh2>\n\n      <div style=\"display:grid; grid-template-columns:repeat(auto-fit,minmax(280px,1fr)); gap:24px;\">\n        <!-- Spacing -->\n        <div style=\"background:#ffffff; border:1px solid #d0d0c8; border-radius:8px; padding:24px;\">\n          <p style=\"font-family:'IBM Plex Mono',monospace; font-size:11px; font-weight:500; letter-spacing:0.06em; text-transform:uppercase; color:#6d6e5e; margin:0 0 20px;\">SPACING · BASE 4PX<\u002Fp>\n          <div style=\"display:flex; flex-direction:column; gap:12px;\">\n            <sc-for list=\"{{ spacing }}\" as=\"s\" hint-placeholder-count=\"9\">\n              <div style=\"display:flex; align-items:center; gap:14px;\">\n                <span style=\"flex:0 0 46px; font-family:'IBM Plex Mono',monospace; font-size:11px; color:#6d6e5e;\">{{ s.label }}<\u002Fspan>\n                <span style=\"height:10px; width:{{ s.w }}; background:#aaa674;\"><\u002Fspan>\n              <\u002Fdiv>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <!-- Radii + borders -->\n        <div style=\"background:#ffffff; border:1px solid #d0d0c8; border-radius:8px; padding:24px;\">\n          <p style=\"font-family:'IBM Plex Mono',monospace; font-size:11px; font-weight:500; letter-spacing:0.06em; text-transform:uppercase; color:#6d6e5e; margin:0 0 20px;\">RADII &amp; BORDERS<\u002Fp>\n          <div style=\"display:flex; gap:20px; align-items:flex-end; margin-bottom:24px;\">\n            <div style=\"text-align:center;\">\n              <div style=\"width:64px; height:48px; background:#f6f6f4; border:1px solid #57584b; border-radius:3px;\"><\u002Fdiv>\n              <p style=\"font-family:'IBM Plex Mono',monospace; font-size:11px; color:#6d6e5e; margin:8px 0 0;\">3px · nav/tags/btn<\u002Fp>\n            <\u002Fdiv>\n            <div style=\"text-align:center;\">\n              <div style=\"width:64px; height:48px; background:#f6f6f4; border:1px solid #57584b; border-radius:8px;\"><\u002Fdiv>\n              <p style=\"font-family:'IBM Plex Mono',monospace; font-size:11px; color:#6d6e5e; margin:8px 0 0;\">8px · cards/panels<\u002Fp>\n            <\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"display:flex; flex-direction:column; gap:10px;\">\n            <div style=\"display:flex; align-items:center; gap:12px;\"><span style=\"width:64px; height:0; border-top:1px solid #d0d0c8;\"><\u002Fspan><span style=\"font-family:'IBM Plex Mono',monospace; font-size:11px; color:#6d6e5e;\">#d0d0c8 · default hairline<\u002Fspan><\u002Fdiv>\n            <div style=\"display:flex; align-items:center; gap:12px;\"><span style=\"width:64px; height:0; border-top:1px solid #57584b;\"><\u002Fspan><span style=\"font-family:'IBM Plex Mono',monospace; font-size:11px; color:#6d6e5e;\">#57584b · stronger / dark panels<\u002Fspan><\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <!-- Elevation -->\n        <div style=\"background:#ffffff; border:1px solid #d0d0c8; border-radius:8px; padding:24px;\">\n          <p style=\"font-family:'IBM Plex Mono',monospace; font-size:11px; font-weight:500; letter-spacing:0.06em; text-transform:uppercase; color:#6d6e5e; margin:0 0 20px;\">ELEVATION = NONE<\u002Fp>\n          <p style=\"font-family:'Hanken Grotesk',sans-serif; font-size:14px; line-height:1.6; color:#57584b; margin:0 0 16px;\">No drop shadows, glow, glass, or gradient elevation. Hierarchy comes from, in order:<\u002Fp>\n          <ol style=\"margin:0; padding-left:18px; display:flex; flex-direction:column; gap:8px;\">\n            <li style=\"font-family:'Hanken Grotesk',sans-serif; font-size:14px; color:#2c2c26;\">1px hairline borders<\u002Fli>\n            <li style=\"font-family:'Hanken Grotesk',sans-serif; font-size:14px; color:#2c2c26;\">Color contrast<\u002Fli>\n            <li style=\"font-family:'Hanken Grotesk',sans-serif; font-size:14px; color:#2c2c26;\">Typography<\u002Fli>\n            <li style=\"font-family:'Hanken Grotesk',sans-serif; font-size:14px; color:#2c2c26;\">Spacing &amp; section rhythm<\u002Fli>\n          <\u002Fol>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- 05 COMPONENTS -->\n  <section id=\"components\" data-screen-label=\"Components\" style=\"border-top:1px solid #d0d0c8;\">\n    <div style=\"max-width:1200px; margin:0 auto; padding:80px 24px;\">\n      <div style=\"display:flex; align-items:center; gap:12px; margin-bottom:20px;\">\n        <span style=\"font-family:'IBM Plex Mono',monospace; font-size:12px; font-weight:500; color:#000;\">05<\u002Fspan>\n        <span style=\"width:24px; height:1px; background:#57584b;\"><\u002Fspan>\n        <span style=\"font-family:'IBM Plex Mono',monospace; font-size:12px; font-weight:500; letter-spacing:0.06em; text-transform:uppercase; color:#6d6e5e;\">Components<\u002Fspan>\n      <\u002Fdiv>\n      <h2 style=\"font-family:'Fraunces',serif; font-weight:300; font-size:clamp(1.8rem,3.6vw,2.5rem); line-height:1.08; letter-spacing:-0.02em; color:#000; margin:0 0 48px;\">Primitives of the operating system.<\u002Fh2>\n\n      <div style=\"display:grid; grid-template-columns:repeat(auto-fit,minmax(300px,1fr)); gap:24px;\">\n        <!-- Buttons -->\n        <div style=\"background:#ffffff; border:1px solid #d0d0c8; border-radius:8px; padding:24px;\">\n          <p style=\"font-family:'IBM Plex Mono',monospace; font-size:11px; font-weight:500; letter-spacing:0.06em; text-transform:uppercase; color:#6d6e5e; margin:0 0 20px;\">BUTTONS<\u002Fp>\n          <div style=\"display:flex; flex-wrap:wrap; gap:12px; align-items:center;\">\n            <button style=\"background:#2c2c26; color:#fff; font-family:'IBM Plex Mono',monospace; font-size:14px; font-weight:500; padding:8px 16px; border:none; border-radius:3px; cursor:pointer;\" style-hover=\"background:#000;\">Read transformation →<\u002Fbutton>\n            <button style=\"background:transparent; color:#000; font-family:'IBM Plex Mono',monospace; font-size:14px; font-weight:500; padding:8px 16px; border:1px solid #000; border-radius:3px; cursor:pointer;\" style-hover=\"background:#e8e7d9;\">View evidence<\u002Fbutton>\n          <\u002Fdiv>\n          <p style=\"font-family:'Hanken Grotesk',sans-serif; font-size:13px; line-height:1.5; color:#979886; margin:16px 0 0;\">Mono · 14px / 500 · 8×16 padding · 3px radius · no shadow, no gradient.<\u002Fp>\n        <\u002Fdiv>\n        <!-- Eyebrow + index -->\n        <div style=\"background:#ffffff; border:1px solid #d0d0c8; border-radius:8px; padding:24px;\">\n          <p style=\"font-family:'IBM Plex Mono',monospace; font-size:11px; font-weight:500; letter-spacing:0.06em; text-transform:uppercase; color:#6d6e5e; margin:0 0 20px;\">EYEBROW + SECTION INDEX<\u002Fp>\n          <div style=\"display:flex; align-items:center; gap:12px; margin-bottom:14px;\">\n            <span style=\"font-family:'IBM Plex Mono',monospace; font-size:12px; font-weight:500; color:#000;\">03<\u002Fspan>\n            <span style=\"width:24px; height:1px; background:#57584b;\"><\u002Fspan>\n            <span style=\"font-family:'IBM Plex Mono',monospace; font-size:12px; font-weight:500; letter-spacing:0.06em; text-transform:uppercase; color:#6d6e5e;\">How He Thinks<\u002Fspan>\n          <\u002Fdiv>\n          <p style=\"font-family:'Hanken Grotesk',sans-serif; font-size:13px; line-height:1.5; color:#979886; margin:0;\">Two-digit index → coordinate rule → mono eyebrow. Recurs on every major section.<\u002Fp>\n        <\u002Fdiv>\n        <!-- Tags -->\n        <div style=\"background:#ffffff; border:1px solid #d0d0c8; border-radius:8px; padding:24px;\">\n          <p style=\"font-family:'IBM Plex Mono',monospace; font-size:11px; font-weight:500; letter-spacing:0.06em; text-transform:uppercase; color:#6d6e5e; margin:0 0 20px;\">TAGS &amp; BADGES<\u002Fp>\n          <div style=\"display:flex; flex-wrap:wrap; gap:8px; margin-bottom:16px;\">\n            <span style=\"font-family:'IBM Plex Mono',monospace; font-size:12px; font-weight:500; color:#6d6e5e; border:1px solid #aaa674; padding:4px 8px; border-radius:3px;\">TRANSFORMATION<\u002Fspan>\n            <span style=\"font-family:'IBM Plex Mono',monospace; font-size:12px; font-weight:500; color:#6d6e5e; border:1px solid #aaa674; background:#e8e7d9; padding:4px 8px; border-radius:3px;\">VENTURE 01<\u002Fspan>\n            <span style=\"font-family:'IBM Plex Mono',monospace; font-size:12px; font-weight:500; color:#6d6e5e; border:1px solid #aaa674; padding:4px 8px; border-radius:3px;\">VERIFIED<\u002Fspan>\n          <\u002Fdiv>\n          <p style=\"font-family:'Hanken Grotesk',sans-serif; font-size:13px; line-height:1.5; color:#979886; margin:0;\">Olive tag — khaki-olive border, lichen mono text, transparent or bone fill.<\u002Fp>\n        <\u002Fdiv>\n        <!-- Accent bars -->\n        <div style=\"background:#ffffff; border:1px solid #d0d0c8; border-radius:8px; padding:24px;\">\n          <p style=\"font-family:'IBM Plex Mono',monospace; font-size:11px; font-weight:500; letter-spacing:0.06em; text-transform:uppercase; color:#6d6e5e; margin:0 0 20px;\">ACCENT BARS<\u002Fp>\n          <div style=\"display:flex; flex-direction:column; gap:12px; margin-bottom:16px;\">\n            <span style=\"width:120px; height:6px; background:#fff347;\"><\u002Fspan>\n            <span style=\"width:80px; height:4px; background:#000;\"><\u002Fspan>\n            <span style=\"width:48px; height:2px; background:#000;\"><\u002Fspan>\n          <\u002Fdiv>\n          <p style=\"font-family:'Hanken Grotesk',sans-serif; font-size:13px; line-height:1.5; color:#979886; margin:0;\">2–6px strokes, 40–120px wide. Ink &amp; highlighter. Decorative punctuation only.<\u002Fp>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- 06 EDITORIAL MODULES -->\n  <section id=\"modules\" data-screen-label=\"Modules\" style=\"border-top:1px solid #d0d0c8;\">\n    <div style=\"max-width:1200px; margin:0 auto; padding:80px 24px;\">\n      <div style=\"display:flex; align-items:center; gap:12px; margin-bottom:20px;\">\n        <span style=\"font-family:'IBM Plex Mono',monospace; font-size:12px; font-weight:500; color:#000;\">06<\u002Fspan>\n        <span style=\"width:24px; height:1px; background:#57584b;\"><\u002Fspan>\n        <span style=\"font-family:'IBM Plex Mono',monospace; font-size:12px; font-weight:500; letter-spacing:0.06em; text-transform:uppercase; color:#6d6e5e;\">Editorial Modules<\u002Fspan>\n      <\u002Fdiv>\n      <h2 style=\"font-family:'Fraunces',serif; font-weight:300; font-size:clamp(1.8rem,3.6vw,2.5rem); line-height:1.08; letter-spacing:-0.02em; color:#000; margin:0 0 48px;\">Cards are dossiers, not boxes.<\u002Fh2>\n\n      <div style=\"display:grid; grid-template-columns:1.1fr 0.9fr; gap:24px; align-items:start;\">\n        <!-- Case file card -->\n        <article style=\"background:#ffffff; border:1px solid #d0d0c8; border-radius:8px; overflow:hidden;\">\n          <div style=\"display:flex; justify-content:space-between; align-items:center; padding:12px 24px; border-bottom:1px solid #d0d0c8;\">\n            <span style=\"font-family:'IBM Plex Mono',monospace; font-size:11px; font-weight:500; letter-spacing:0.06em; text-transform:uppercase; color:#6d6e5e;\">CASE FILE 01 · TRANSFORMATION<\u002Fspan>\n            <span style=\"font-family:'IBM Plex Mono',monospace; font-size:11px; color:#aaa674;\">FINTECH<\u002Fspan>\n          <\u002Fdiv>\n          <div style=\"padding:24px;\">\n            <h3 style=\"font-family:'Fraunces',serif; font-weight:300; font-size:28px; line-height:1.1; letter-spacing:-0.02em; color:#000; margin:0 0 12px;\">Building a design organization from 0 → 12.<\u002Fh3>\n            <p style=\"font-family:'Hanken Grotesk',sans-serif; font-size:15px; line-height:1.6; color:#57584b; margin:0 0 24px;\">Stood up the design function from scratch — hiring, rituals, and an operating system that scaled craft without scaling headcount linearly.<\u002Fp>\n            <div style=\"border-top:1px solid #d0d0c8; padding-top:16px; margin-bottom:20px;\">\n              <p style=\"font-family:'IBM Plex Mono',monospace; font-size:11px; font-weight:500; letter-spacing:0.06em; text-transform:uppercase; color:#6d6e5e; margin:0 0 8px;\">WHAT IT PROVES<\u002Fp>\n              <p style=\"font-family:'Hanken Grotesk',sans-serif; font-size:14px; line-height:1.55; color:#2c2c26; margin:0 0 12px;\">Can build durable organizations, not just ship screens.<\u002Fp>\n              <span style=\"font-family:'IBM Plex Mono',monospace; font-size:12px; font-weight:500; color:#6d6e5e; border:1px solid #aaa674; background:#e8e7d9; padding:4px 8px; border-radius:3px;\">20+ HIRES · VERIFIED<\u002Fspan>\n            <\u002Fdiv>\n            <a href=\"#\" style=\"font-family:'IBM Plex Mono',monospace; font-size:13px; font-weight:500; color:#000; text-decoration:none; border-bottom:2px solid #000; padding-bottom:2px;\">Read transformation →<\u002Fa>\n          <\u002Fdiv>\n        <\u002Farticle>\n\n        <!-- Capability cells -->\n        <div style=\"border:1px solid #d0d0c8; border-radius:8px; overflow:hidden; background:#ffffff;\">\n          <div style=\"display:grid; grid-template-columns:1fr 1fr;\">\n            <sc-for list=\"{{ capabilities }}\" as=\"cap\" hint-placeholder-count=\"4\">\n              <div style=\"padding:20px; border-right:1px solid #d0d0c8; border-bottom:1px solid #d0d0c8;\">\n                <div style=\"display:flex; align-items:center; gap:10px; margin-bottom:14px;\">\n                  <span style=\"font-family:'IBM Plex Mono',monospace; font-size:11px; font-weight:500; color:#000;\">{{ cap.idx }}<\u002Fspan>\n                  <span style=\"font-family:'IBM Plex Mono',monospace; font-size:10px; font-weight:500; letter-spacing:0.06em; color:#aaa674;\">CAPABILITY<\u002Fspan>\n                <\u002Fdiv>\n                <h4 style=\"font-family:'Fraunces',serif; font-weight:300; font-size:19px; line-height:1.15; letter-spacing:-0.01em; color:#000; margin:0 0 8px;\">{{ cap.title }}<\u002Fh4>\n                <p style=\"font-family:'Hanken Grotesk',sans-serif; font-size:13px; line-height:1.5; color:#979886; margin:0;\">{{ cap.note }}<\u002Fp>\n              <\u002Fdiv>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <!-- Evidence ledger (interactive mode demo) -->\n      <div style=\"margin-top:24px; background:#ffffff; border:1px solid #d0d0c8; border-radius:8px; padding:24px;\">\n        <div style=\"display:flex; flex-wrap:wrap; gap:16px; align-items:center; justify-content:space-between; margin-bottom:24px;\">\n          <p style=\"font-family:'IBM Plex Mono',monospace; font-size:11px; font-weight:500; letter-spacing:0.06em; text-transform:uppercase; color:#6d6e5e; margin:0;\">EVIDENCE LEDGER · EXECUTIVE SNAPSHOT<\u002Fp>\n          <div style=\"display:flex; gap:0; border:1px solid #d0d0c8; border-radius:3px; overflow:hidden;\">\n            <button onclick=\"{{ setPublic }}\" style=\"font-family:'IBM Plex Mono',monospace; font-size:11px; font-weight:500; letter-spacing:0.04em; text-transform:uppercase; padding:6px 12px; border:none; cursor:pointer; background:{{ publicBg }}; color:{{ publicFg }};\">Public<\u002Fbutton>\n            <button onclick=\"{{ setInternal }}\" style=\"font-family:'IBM Plex Mono',monospace; font-size:11px; font-weight:500; letter-spacing:0.04em; text-transform:uppercase; padding:6px 12px; border:none; border-left:1px solid #d0d0c8; cursor:pointer; background:{{ internalBg }}; color:{{ internalFg }};\">Internal<\u002Fbutton>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"display:grid; grid-template-columns:repeat(auto-fit,minmax(150px,1fr)); gap:0;\">\n          <sc-for list=\"{{ ledger }}\" as=\"m\" hint-placeholder-count=\"4\">\n            <div style=\"padding:4px 24px 4px 0; border-left:1px solid #d0d0c8; padding-left:20px;\">\n              <p style=\"font-family:'Fraunces',serif; font-weight:300; font-size:44px; line-height:1; letter-spacing:-0.03em; color:{{ m.numColor }}; margin:0 0 8px;\">{{ m.display }}<\u002Fp>\n              <p style=\"font-family:'Hanken Grotesk',sans-serif; font-size:13px; line-height:1.4; color:#57584b; margin:0 0 6px;\">{{ m.label }}<\u002Fp>\n              <span style=\"font-family:'IBM Plex Mono',monospace; font-size:10px; font-weight:500; letter-spacing:0.06em; text-transform:uppercase; color:#aaa674;\">{{ m.note }}<\u002Fspan>\n            <\u002Fdiv>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n        <p style=\"font-family:'Hanken Grotesk',sans-serif; font-size:13px; line-height:1.55; color:#979886; margin:24px 0 0; max-width:640px;\">{{ ledgerCaption }}<\u002Fp>\n      <\u002Fdiv>\n\n      <!-- Dark product panel -->\n      <div style=\"margin-top:24px; background:#2c2c26; border:1px solid #57584b; border-radius:8px; padding:32px;\">\n        <div style=\"display:flex; align-items:center; gap:12px; margin-bottom:20px;\">\n          <span style=\"font-family:'IBM Plex Mono',monospace; font-size:11px; font-weight:500; color:#fff;\">VENTURE 01<\u002Fspan>\n          <span style=\"width:24px; height:3px; background:#fff347;\"><\u002Fspan>\n          <span style=\"font-family:'IBM Plex Mono',monospace; font-size:11px; font-weight:500; letter-spacing:0.06em; text-transform:uppercase; color:#aaab9c;\">Dark Product Panel<\u002Fspan>\n        <\u002Fdiv>\n        <h3 style=\"font-family:'Fraunces',serif; font-weight:300; font-size:32px; line-height:1.08; letter-spacing:-0.02em; color:#fff; margin:0 0 12px; max-width:18ch;\">Surfaces invert; the <span style=\"position:relative; white-space:nowrap;\">system<span style=\"position:absolute; left:0; right:0; bottom:0.1em; height:0.18em; background:#fff347; z-index:-1;\"><\u002Fspan><\u002Fspan> stays the same.<\u002Fh3>\n        <p style=\"font-family:'Hanken Grotesk',sans-serif; font-size:15px; line-height:1.6; color:#d0d0c8; margin:0 0 24px; max-width:560px;\">Dark panels use carbon ground, olive-char strokes, and ash / moss / paper text. Used for product mockups and the footer — never as a decorative dark mode.<\u002Fp>\n        <div style=\"display:flex; gap:12px; flex-wrap:wrap;\">\n          <button style=\"background:#fff; color:#000; font-family:'IBM Plex Mono',monospace; font-size:14px; font-weight:500; padding:8px 16px; border:none; border-radius:3px; cursor:pointer;\">Open ledger<\u002Fbutton>\n          <button style=\"background:transparent; color:#fff; font-family:'IBM Plex Mono',monospace; font-size:14px; font-weight:500; padding:8px 16px; border:1px solid #57584b; border-radius:3px; cursor:pointer;\" style-hover=\"border-color:#aaab9c;\">Documentation<\u002Fbutton>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- 07 MOTION + A11Y -->\n  <section data-screen-label=\"Motion &amp; Access\" style=\"border-top:1px solid #d0d0c8;\">\n    <div style=\"max-width:1200px; margin:0 auto; padding:80px 24px;\">\n      <div style=\"display:flex; align-items:center; gap:12px; margin-bottom:20px;\">\n        <span style=\"font-family:'IBM Plex Mono',monospace; font-size:12px; font-weight:500; color:#000;\">07<\u002Fspan>\n        <span style=\"width:24px; height:1px; background:#57584b;\"><\u002Fspan>\n        <span style=\"font-family:'IBM Plex Mono',monospace; font-size:12px; font-weight:500; letter-spacing:0.06em; text-transform:uppercase; color:#6d6e5e;\">Motion &amp; Accessibility<\u002Fspan>\n      <\u002Fdiv>\n      <h2 style=\"font-family:'Fraunces',serif; font-weight:300; font-size:clamp(1.8rem,3.6vw,2.5rem); line-height:1.08; letter-spacing:-0.02em; color:#000; margin:0 0 48px;\">Motion must clarify. Access is craft.<\u002Fh2>\n      <div style=\"display:grid; grid-template-columns:repeat(auto-fit,minmax(280px,1fr)); gap:24px;\">\n        <div style=\"background:#ffffff; border:1px solid #d0d0c8; border-radius:8px; padding:24px;\">\n          <p style=\"font-family:'IBM Plex Mono',monospace; font-size:11px; font-weight:500; letter-spacing:0.06em; text-transform:uppercase; color:#6d6e5e; margin:0 0 16px;\">ALLOWED MOTION<\u002Fp>\n          <p style=\"font-family:'Hanken Grotesk',sans-serif; font-size:14px; line-height:1.6; color:#2c2c26; margin:0 0 16px;\">Section reveal, text fade/rise, timeline progression, accordion expansion. Hover = subtle tone shift only (border ash→olive-char), ≈0.16s ease. Expensive, not playful.<\u002Fp>\n          <div style=\"font-family:'Hanken Grotesk',sans-serif; font-size:13px; color:#979886;\">Hover this card &nbsp;↓<\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"background:#ffffff; border:1px solid #d0d0c8; border-radius:8px; padding:24px; transition:border-color .16s ease, background .16s ease;\" style-hover=\"border-color:#57584b; background:rgba(232,231,217,0.5);\">\n          <p style=\"font-family:'IBM Plex Mono',monospace; font-size:11px; font-weight:500; letter-spacing:0.06em; text-transform:uppercase; color:#6d6e5e; margin:0 0 16px;\">NOT ALLOWED<\u002Fp>\n          <p style=\"font-family:'Hanken Grotesk',sans-serif; font-size:14px; line-height:1.6; color:#979886; margin:0;\">Bounce · parallax · scroll hijacking · cursor gimmicks · floating objects · overanimated cards · any motion that reads like an agency portfolio.<\u002Fp>\n        <\u002Fdiv>\n        <div style=\"background:#ffffff; border:1px solid #d0d0c8; border-radius:8px; padding:24px;\">\n          <p style=\"font-family:'IBM Plex Mono',monospace; font-size:11px; font-weight:500; letter-spacing:0.06em; text-transform:uppercase; color:#6d6e5e; margin:0 0 16px;\">ACCESSIBILITY FLOOR<\u002Fp>\n          <p style=\"font-family:'Hanken Grotesk',sans-serif; font-size:14px; line-height:1.6; color:#2c2c26; margin:0;\">Semantic HTML · correct heading order · keyboard nav · visible 2px ink focus · sufficient contrast · alt text · responsive · no horizontal overflow · honors reduced-motion.<\u002Fp>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- FOOTER -->\n  <footer style=\"background:#2c2c26; border-top:1px solid #57584b;\">\n    <div style=\"max-width:1200px; margin:0 auto; padding:48px 24px; display:flex; flex-wrap:wrap; gap:24px; align-items:center; justify-content:space-between;\">\n      <div style=\"display:flex; align-items:center; gap:12px;\">\n        <span style=\"display:inline-block; width:18px; height:6px; background:#fff347;\"><\u002Fspan>\n        <span style=\"font-family:'IBM Plex Mono',monospace; font-size:12px; font-weight:500; letter-spacing:0.06em; text-transform:uppercase; color:#fff;\">WARM EDITORIAL ZINE — DESIGN SYSTEM<\u002Fspan>\n      <\u002Fdiv>\n      <p style=\"font-family:'IBM Plex Mono',monospace; font-size:11px; color:#aaab9c; margin:0;\">When in doubt, remove decoration and increase clarity.<\u002Fp>\n    <\u002Fdiv>\n  <\u002Ffooter>\n\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{&quot;$preview&quot;:{&quot;width&quot;:1200,&quot;height&quot;:900},&quot;mode&quot;:{&quot;editor&quot;:&quot;enum&quot;,&quot;options&quot;:[&quot;public&quot;,&quot;internal&quot;],&quot;default&quot;:&quot;public&quot;,&quot;tsType&quot;:&quot;string&quot;,&quot;section&quot;:&quot;Evidence&quot;,&quot;unit&quot;:&quot;&quot;}}\">\nclass Component extends DCLogic {\n  state = { mode: this.props.mode === \"internal\" ? \"internal\" : \"public\" };\n\n  renderVals() {\n    const mode = this.state.mode;\n    const isPublic = mode === \"public\";\n\n    const palette = [\n      { name: \"Vellum\", hex: \"#f6f6f4\", use: \"Page canvas\", fg: \"#000000\" },\n      { name: \"Paper\", hex: \"#ffffff\", use: \"Card surfaces\", fg: \"#000000\" },\n      { name: \"Ink\", hex: \"#000000\", use: \"Primary text\", fg: \"#fff347\" },\n      { name: \"Carbon\", hex: \"#2c2c26\", use: \"Dark panels, footer\", fg: \"#fff347\" },\n      { name: \"Ash\", hex: \"#d0d0c8\", use: \"Default hairline\", fg: \"#2c2c26\" },\n      { name: \"Olive Char\", hex: \"#57584b\", use: \"Strong border, muted text\", fg: \"#fff347\" },\n      { name: \"Lichen\", hex: \"#6d6e5e\", use: \"Mono labels\", fg: \"#fff347\" },\n      { name: \"Sage\", hex: \"#979886\", use: \"Tertiary text\", fg: \"#f6f6f4\" },\n      { name: \"Moss\", hex: \"#aaab9c\", use: \"Dark-panel text\", fg: \"#f6f6f4\" },\n      { name: \"Bone\", hex: \"#e8e7d9\", use: \"Soft tag tint\", fg: \"#2c2c26\" },\n      { name: \"Highlighter\", hex: \"#fff347\", use: \"Single accent\", fg: \"#000000\" },\n      { name: \"Khaki Olive\", hex: \"#aaa674\", use: \"Tag borders\", fg: \"#f6f6f4\" },\n    ];\n\n    const scale = [\n      { name: \"Display 96\", meta: \"96 / 90 · SERIF\", family: \"'Fraunces',serif\", weight: 300, px: \"clamp(48px,7vw,96px)\", track: \"-4.8px\" },\n      { name: \"Display Small 64\", meta: \"64 / 64 · SERIF\", family: \"'Fraunces',serif\", weight: 300, px: \"clamp(40px,5vw,64px)\", track: \"-3.2px\" },\n      { name: \"Heading Large 48\", meta: \"48 / 54 · SERIF\", family: \"'Fraunces',serif\", weight: 400, px: \"48px\", track: \"-2.4px\" },\n      { name: \"Heading 32\", meta: \"32 / 32 · SERIF\", family: \"'Fraunces',serif\", weight: 400, px: \"32px\", track: \"-1.6px\" },\n      { name: \"Heading Small 24\", meta: \"24 / 24 · SERIF\", family: \"'Fraunces',serif\", weight: 400, px: \"24px\", track: \"-1.2px\" },\n      { name: \"Subheading 20\", meta: \"20 / 30 · MONO/SERIF\", family: \"'Hanken Grotesk',sans-serif\", weight: 500, px: \"20px\", track: \"-0.5px\" },\n      { name: \"Body 16 — the default reading size\", meta: \"16 / 24 · SANS\", family: \"'Hanken Grotesk',sans-serif\", weight: 400, px: \"16px\", track: \"0\" },\n      { name: \"Body Small 14 — supporting copy\", meta: \"14 / 19 · SANS\", family: \"'Hanken Grotesk',sans-serif\", weight: 400, px: \"14px\", track: \"0\" },\n      { name: \"CAPTION 12 · MONO METADATA\", meta: \"12 / 17 · MONO\", family: \"'IBM Plex Mono',monospace\", weight: 500, px: \"12px\", track: \"0.06em\" },\n    ];\n\n    const spacing = [\n      { label: \"4\", w: \"4px\" }, { label: \"8\", w: \"8px\" }, { label: \"12\", w: \"12px\" },\n      { label: \"16\", w: \"16px\" }, { label: \"24\", w: \"24px\" }, { label: \"32\", w: \"32px\" },\n      { label: \"64\", w: \"64px\" }, { label: \"80\", w: \"80px\" }, { label: \"128\", w: \"128px\" },\n    ];\n\n    const capabilities = [\n      { idx: \"01\", title: \"0→1 Product\", note: \"From ambiguity to shipped outcome.\" },\n      { idx: \"02\", title: \"Design Orgs\", note: \"Hiring, rituals, operating systems.\" },\n      { idx: \"03\", title: \"AI-Native Craft\", note: \"Designing with models, not around them.\" },\n      { idx: \"04\", title: \"Growth Systems\", note: \"Behavioral engines that compound.\" },\n    ];\n\n    // Decision 025: in public mode, unverified numbers don't render — a polished\n    // label-only fallback shows instead and feels intentional.\n    const ledgerData = [\n      { value: \"12M+\", label: \"Monthly active users\", verified: true, fallback: \"Consumer scale\" },\n      { value: \"0→12\", label: \"Design function built\", verified: true, fallback: \"Org built from zero\" },\n      { value: \"62%\", label: \"Fraud reduction\", verified: false, fallback: \"Material fraud reduction\" },\n      { value: \"28×\", label: \"Digital gold growth\", verified: false, fallback: \"Category-leading growth\" },\n    ];\n\n    const ledger = ledgerData.map((m) => {\n      if (isPublic && !m.verified) {\n        return { display: m.fallback, label: m.label, numColor: \"#000000\", note: \"\" };\n      }\n      return {\n        display: m.value,\n        label: m.label,\n        numColor: \"#000000\",\n        note: isPublic ? \"VERIFIED\" : (m.verified ? \"VERIFIED\" : \"EVIDENCE REVIEW PENDING\"),\n      };\n    });\n\n    const ledgerCaption = isPublic\n      ? \"Public mode — only verified metrics render their numbers; unverified claims show a polished label-only fallback. Internal governance language never appears.\"\n      : \"Internal / staging mode — every metric renders with a single restrained \\u201cevidence review pending\\u201d marker until it passes Claims Review.\";\n\n    const setPublic = () => this.setState({ mode: \"public\" });\n    const setInternal = () => this.setState({ mode: \"internal\" });\n\n    return {\n      palette, scale, spacing, capabilities, ledger, ledgerCaption,\n      setPublic, setInternal,\n      publicBg: isPublic ? \"#2c2c26\" : \"transparent\",\n      publicFg: isPublic ? \"#ffffff\" : \"#6d6e5e\",\n      internalBg: !isPublic ? \"#2c2c26\" : \"transparent\",\n      internalFg: !isPublic ? \"#ffffff\" : \"#6d6e5e\",\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
